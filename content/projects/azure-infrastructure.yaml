slug: azure-infrastructure
title: Azure Infrastructure Consolidation
subtitle: "46 Cloud Resources, One Coherent Architecture"
hook: "46 cloud resources optimized. Targeting ~60% cost reduction."
type: work

tags:
  - Azure
  - Terraform
  - IaC
  - DevOps

