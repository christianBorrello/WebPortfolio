# Journey Schema -- Experience Timeline
# Structured representation of both user journeys (recruiter + hiring manager)

journey:
  name: experience-timeline
  epic: experience-timeline
  version: "1.0"
  created: "2026-03-03"

  description: >
    Una timeline cronologica unificata sulla homepage che sostituisce
    la griglia Projects, collegando formazione, esperienza lavorativa
    e progetti personali in un'unica narrativa professionale.

  context:
    current_state: >
      La homepage mostra una griglia Projects con card isolate.
      Nessun contesto temporale, nessuna traiettoria professionale visibile.
      Il recruiter deve cliccare nelle card per capire ruolo e azienda.
    desired_state: >
      La homepage mostra una timeline unificata che racconta la storia
      professionale completa. Ruolo, azienda, durata e progetti collegati
      sono visibili senza cliccare. L'aggiunta di nuove entry rafforza
      la narrativa anziche' frammentarla.
    replaces: ProjectGrid component (src/features/projects/project-grid.tsx)

  personas:
    - id: recruiter
      name: Marco Ferretti
      role: Technical Recruiter
      reading_mode: scan (pattern-matching rapido)
      time_on_section: 20-30 secondi
      seeks:
        - ruolo attuale
        - nome azienda
        - durata posizione
        - ampiezza stack tecnologico
        - numeri concreti di impatto
      emotional_arc: Scettico -> Orientato -> Classificato

    - id: hiring-manager
      name: Laura Chen
      role: Engineering Manager / CTO
      reading_mode: deep read (costruzione narrativa)
      time_on_section: 2-3 minuti (timeline) + 5-8 minuti (case study)
      seeks:
        - traiettoria di crescita professionale
        - coerenza tra lavoro e passione
        - profondita' di pensiero architetturale
        - onesta' sui limiti
        - agency e iniziativa
      emotional_arc: Valutativa -> Incuriosita -> Convinta

  entry_types:
    - type: work
      description: Esperienza lavorativa con ruolo, azienda e periodo
      visual_marker: icona e badge "Work"
      has_project_cards: true
      has_case_study_link: false (le project card dentro il work hanno il link)
      fields:
        - title (ruolo)
        - organization (azienda)
        - period (start - end/Present)
        - description (1 riga)
        - highlights (risultati concreti, opzionale)
        - technologies (tag)
        - relatedProjects (slug dei case study collegati)

    - type: education
      description: Formazione (laurea, certificazioni, corsi)
      visual_marker: icona e badge "Education"
      has_project_cards: false
      has_case_study_link: false
      fields:
        - title (titolo di studio)
        - organization (universita'/ente)
        - period (start - end)
        - description (1 riga)

    - type: project
      description: Progetto personale con link al case study
      visual_marker: icona e badge "Project"
      has_project_cards: false
      has_case_study_link: true
      fields:
        - title (nome progetto)
        - period (anno o range)
        - description (1 riga -- il PERCHE', non il COSA)
        - technologies (tag)
        - projectSlug (link al case study)

  steps:
    - id: step-1
      name: Primo impatto con la Timeline
      page: Homepage -- sezione Experience
      trigger: Utente scrolla oltre About oppure clicca "View my work"
      viewport: Heading + prima entry visibile above the fold
      produces:
        - orientamento (ruolo, azienda, periodo della entry piu' recente)
        - impressione di struttura (non e' una lista, e' una narrativa)
      risks:
        - prima entry senza dati salienti
        - heading generico che non comunica il valore della sezione
      emotional_state:
        recruiter: Orientato
        hiring_manager: Interessata

    - id: step-2
      name: Scroll della Timeline completa
      page: Homepage -- sezione Experience (scroll)
      trigger: Utente scrolla verso il basso
      animation: entry appaiono progressivamente (fade-in + translateY)
      produces:
        - traiettoria professionale completa
        - distinzione visiva tra tipi di entry
        - classificazione del candidato (recruiter)
        - narrativa di crescita (hiring manager)
      risks:
        - timeline troppo lunga
        - distinzione visiva insufficiente tra tipi
        - animazione che rallenta lo scan
      emotional_state:
        recruiter: Classificato (journey puo' terminare qui)
        hiring_manager: Incuriosita (vuole approfondire)

    - id: step-3
      name: Click su case study
      page: Pagina case study dedicata
      trigger: Click su "Read case study" da project card (dentro work) o da project entry
      produces:
        - validazione della profondita' tecnica
        - conferma del ragionamento architetturale
      risks:
        - ritorno alla homepage perde il contesto della timeline
        - case study troppo lungo senza struttura navigabile
      emotional_state:
        recruiter: Convinto (se clicca, altrimenti salta)
        hiring_manager: Convinta

    - id: step-4
      name: Ritorno alla Timeline (solo hiring manager)
      page: Homepage -- sezione Experience (ritorno)
      trigger: Click "Back to experience" dal case study
      produces:
        - continuita' dell'esplorazione
        - secondo case study (progetto personale)
      risks:
        - link di ritorno porta in cima alla pagina
        - deve ri-scrollare fino alla timeline
      emotional_state:
        hiring_manager: Rafforzata

    - id: step-5
      name: Contatto
      page: Homepage -- sezione Contact
      trigger: Scroll fino a Contact oppure click su nav "Contact"
      produces:
        - lead qualificato
      emotional_state:
        recruiter: Sicuro
        hiring_manager: Motivata

  shared_artifacts:
    - name: entry-role-org-period
      description: Titolo ruolo + nome azienda + periodo per ogni work entry
      source: content/experience/{locale}.yaml -> entry.title + entry.organization + entry.period
      consumed_by:
        - Timeline entry component (visualizzazione)
        - Recruiter pattern-matching (Step 1-2)
        - Hiring manager narrative building (Step 1-2)

    - name: tech-tags
      description: Tag tecnologici per work entry e project entry
      source: content/experience/{locale}.yaml -> entry.technologies
      consumed_by:
        - Timeline entry component (badge/chip)
        - Recruiter stack classification (Step 2)

    - name: project-card-inline
      description: Card dei progetti associati a un'esperienza lavorativa
      source: content/projects/{locale}/{slug}.yaml -> ProjectSummary
      consumed_by:
        - Work entry nella timeline (card annidata)
        - Link al case study

    - name: entry-type-visual
      description: Differenziazione visiva per tipo (icona + badge)
      source: Design system (colore/icona per work, education, project)
      consumed_by:
        - Timeline entry component
        - Scansione rapida recruiter
        - Navigazione visiva hiring manager

    - name: back-link-anchor
      description: Link di ritorno dal case study alla sezione Experience
      source: Navigation component
      consumed_by:
        - Hiring manager flow (ritorno alla timeline dopo case study)

  integration_checkpoints:
    - checkpoint: experience-yaml-to-timeline
      description: I dati YAML vengono caricati e renderizzati correttamente nella timeline
      source: content/experience/{locale}.yaml
      target: ExperienceTimeline component
      validation: Tutte le entry presenti nel YAML sono visibili nella timeline

    - checkpoint: related-projects-to-cards
      description: I relatedProjects delle work entry risolvono ai case study corretti
      source: entry.relatedProjects (slug array)
      target: ProjectCard component dentro la work entry
      validation: Ogni slug in relatedProjects corrisponde a un file in content/projects/

    - checkpoint: project-entry-to-case-study
      description: Le project entry linkano alla pagina case study corretta
      source: entry.projectSlug
      target: /[locale]/projects/[slug] page
      validation: Il link porta alla pagina corretta con i dati del progetto

    - checkpoint: nav-anchor-update
      description: La navigazione punta alla sezione Experience con l'ancora corretta
      source: navigation.tsx NAV_LINKS
      target: section#experience
      validation: Click su "Experience" in nav scrolla alla sezione corretta

    - checkpoint: back-link-from-case-study
      description: Il link di ritorno dal case study porta alla sezione Experience
      source: navigation.tsx (showBackLink)
      target: /{locale}/#experience
      validation: Click su "Back to experience" atterra nella sezione, non in cima alla pagina

  quality_gates:
    - gate: journey-completeness
      criteria:
        - Happy path recruiter mappato (scan -> classificazione -> contatto)
        - Happy path hiring manager mappato (lettura -> case study -> contatto)
        - Error path coperto (back link, timeline vuota, animazione ridotta)
      status: PASS

    - gate: emotional-coherence
      criteria:
        - Arco emotivo recruiter senza salti (Scettico -> Orientato -> Classificato)
        - Arco emotivo hiring manager senza salti (Valutativa -> Incuriosita -> Convinta)
        - Nessuna transizione emotiva negativa nel flusso principale
      status: PASS

    - gate: horizontal-integration
      criteria:
        - Tutti gli artefatti condivisi hanno fonte singola e documentata
        - I checkpoint di integrazione coprono tutti i punti di giunzione
        - Nessun dato duplicato tra timeline entry e project card
      status: PASS

    - gate: accessibility
      criteria:
        - prefers-reduced-motion rispettato (nessuna animazione di scroll)
        - Screen reader puo' navigare la timeline come lista strutturata
        - Contrasto colori sufficiente per i badge di tipo
        - Keyboard navigation funzionante
      status: PENDING (da validare in design)
