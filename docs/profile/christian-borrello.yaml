work_projects:
  - name: SagitterHub
    description: >
      Piattaforma enterprise unificata che consolida tutti i tool aziendali
      (VisureHub, Automa Visure Ipotecarie, Automa Telemaco, RateWatch)
      in un'unica dashboard. WebAPI .NET con endpoint separati per ogni modulo.
      Background workers con trigger Service Bus.
    type: platform
    portfolio_value: flagship
    tech:
      backend: [.NET 8.0, ASP.NET Core, C#, Entity Framework Core, Dapper]
      architecture: [Hexagonal Architecture, DDD, CQRS, Event Sourcing]
      frontend: [React 19, TypeScript, Razor Pages]
      cloud: [Azure App Service, Azure Blob Storage, Azure Key Vault, Azure Service Bus]
      real_time: SignalR
      auth: JWT con RBAC
      testing: TDD, code_coverage >90%, Testcontainers, FsCheck
    metrics:
      code_coverage: ">90%"
    key_decisions:
      - Unificare tool frammentati in una piattaforma coerente — "semplificare il tutto"
      - Hexagonal Architecture per separazione responsabilità e testabilità
      - DDD per gestire complessità del dominio finanziario-immobiliare
      - CQRS per separare read/write
      - TDD come disciplina di design, non solo testing
      - Event Sourcing per tracciabilità
    modules:
      - name: VisureHub
        description: >
          Modulo principale per estrazione automatizzata documenti dal portale
          Agenzia delle Entrate. Architetturalmente il modulo più significativo
          della piattaforma — dimostra la profondità ingegneristica del sistema.
        portfolio_value: key_module
        tech:
          architecture: [Hexagonal Architecture, DDD, CQRS, Event Sourcing]
          frontend: [React 19, TypeScript]
          cloud: [Azure App Service, Azure Blob Storage, Azure Key Vault]
          real_time: SignalR
          auth: JWT con RBAC
          testing: TDD, code_coverage >90%, Testcontainers, FsCheck
      - name: Automa Visure Ipotecarie
        description: Automazione estrazione visure ipotecarie dal portale Agenzia delle Entrate.
        tech: [Selenium WebDriver, .NET, Azure Container Apps]
      - name: Automa Telemaco
        description: Automazione estrazione dati registro imprese (Telemaco/InfoCamere).
        tech: [.NET, Azure Function (consumption-based)]
      - name: RateWatch
        description: >
          Monitoraggio indici tassi europei (Euribor). Rileva variazioni sopra
          soglia configurata e invia notifiche email. Integrato nel CRM aziendale.
        tech: [Azure Function (consumption-based), email notifications]

  - name: Azure Infrastructure Consolidation
    description: >
      Migrazione e ottimizzazione di 46 risorse Azure.
      Riduzione costi operativi significativa attraverso consolidamento
      e scelte architetturali mirate.
    type: infrastructure
    portfolio_value: flagship
    metrics:
      cost_before: ~€380/month
      cost_after: €100-160/month
      savings: ~€220-280/month
      resources: 46
    tech: [Terraform IaC, Azure App Service, Container Apps, Service Bus, PostgreSQL, Key Vault, Application Insights]
    key_decisions:
      - App Service condiviso invece di istanze separate
      - Container Apps per scraper Selenium (serverless, scala a zero)
      - Deployment slots staging/production per zero-downtime deploy

  - name: Web Scraping Centri per l'Impiego
    description: Raccolta dati di contatto di tutti i CPI italiani da fonti istituzionali.
    type: data_collection
    portfolio_value: low

positioning:
  core_statement: "I don't work for duty or money. I work to build something I'm proud of."
  differentiators:
    - Visione sistemica oltre il mandato — identifica cosa farebbe davvero la differenza
    - Quality-first — preferisce fare le cose bene una volta sola
    - ADHD come superpotere — curiosità radicale, iperfocus, pensiero a volo d'uccello
    - Technology agnostic — sceglie in base al problema, non a cosa conosce
    - Pensiero filosofico applicato all'ingegneria
    - Onestà sui limiti come forma di pensiero critico
  honest_vulnerabilities:
    - Junior/intermediate (1.5 anni esperienza)
    - Laurea non ancora conseguita
    - Progetti personali su GitHub non tutti completati
  narrative_strategy: >
    Le vulnerabilità non vengono nascoste né difese — vengono rese irrilevanti
    dalle prove. Chi cerca un senior con 5+ anni non è il target giusto.
    Chi cerca ownership e pensiero architetturale trova tutto quello che cerca.

