journey:
  name: personal-portfolio-cv-site
  owner: Christian Borrello
  version: "1.0"
  language: en
  wave: DISCUSS
  date: "2026-03-01"

positioning:
  core_statement: "I don't work for duty or money. I work to build something I'm proud of."
  differentiators:
    - "Systems thinking: sees architecture where others see tasks"
    - "Quality over speed: does things right once"
    - "ADHD superpowers: hyperfocus, radical curiosity, autonomy"
    - "Goes beyond assigned tasks when stimulated"
    - "Philosophy as a discipline for engineering thinking"
    - "Technology chosen by problem, not by familiarity"
  vulnerability_to_strength:
    vulnerability: "Junior profile, degree in progress"
    reframe: "Judge the work, not the title"
    evidence:
      - "SagitterHub (VisureHub module): Hexagonal Architecture, DDD, CQRS, TDD >90%"
      - "Azure migration: €280/month saved, 46 resources, Terraform IaC"

personas:
  - id: recruiter
    name: Marco Ferretti
    role: Technical Recruiter
    context: "Looking for Senior Software Engineer, full-remote, small/growing team"
    entry_point: LinkedIn profile link
    primary_fear: "Profile won't stand out from generic candidates"
    decision_trigger: "Case study with multi-level reasoning and explicit thinking"
    reading_order:
      - hero
      - about
      - projects_overview
      - case_study_sagitterHub
      - contact
    emotional_arc:
      start: skeptical
      middle: intrigued
      end: convinced
    key_moment: "Case study that reads as an engineering essay, not a tech list"

  - id: freelance_client
    name: Giulia Marchetti
    role: Founder / CTO early-stage startup
    context: "Needs senior engineer for complex project, no internal technical team"
    entry_point: Direct referral from mutual contact
    primary_fear: "Freelancer disappears mid-project or delivers unmaintainable code"
    decision_trigger: "Concrete business impact + honesty about limitations"
    reading_order:
      - hero
      - projects_overview
      - case_study_azure
      - about
      - contact
    emotional_arc:
      start: distrustful
      middle: reassured
      end: enthusiastic
    key_moment: "Case study showing business impact + 'what I would do differently' section"

site_sections:
  - id: hero
    purpose: "Identity in 30 seconds"
    emotional_goal: "Stop the scroll — break the generic portfolio pattern"
    content:
      primary_statement: "I don't work for duty or money. I work to build something I'm proud of."
      supporting_line: "I see architectures where others see tasks."
      identity: "Christian Borrello — Software Engineer, Systems Thinker"
      cta_primary: "View my work"
      cta_secondary: "Get in touch"
    shared_artifacts_produced:
      - professional_identity
      - tone_of_voice
    risks:
      - "Strong statement not followed by proof = loses credibility"

  - id: about
    purpose: "Values, what kind of company they're looking for"
    emotional_goal:
      recruiter: "Recognize the cultural fit"
      freelance_client: "Understand this person won't disappear"
    content:
      professional_identity: "Systems thinker who goes beyond assigned tasks"
      adhd_framing: "Radical curiosity, hyperfocus, whole-system view — not a limitation, a pattern"
      technology_philosophy: "I choose technologies based on the problem, not based on what I know"
      philosophy_connection: "Philosophy trains the kind of thinking that makes a better engineer"
      values: "Honesty, simplicity, humanity first, mutual respect as a non-negotiable"
      what_i_look_for: "Remote-first, ownership-driven, quality non-negotiable"
    shared_artifacts_produced:
      - cultural_fit_signal
      - values_statement
    risks:
      - "Too philosophical without technical anchoring"

  - id: projects
    purpose: "Architectural case studies, not tech lists"
    emotional_goal: "Prove the claims made in Hero and About"
    case_study_template:
      sections:
        - id: the_problem
          description: "Business problem in plain language — accessible to non-specialists"
        - id: what_i_saw
          description: "Explicit reasoning: what I noticed that others missed"
        - id: the_decisions
          description: "Criteria used, what was rejected and why, trade-offs accepted"
        - id: beyond_assignment
          description: "What I did without being asked — agency and initiative"
        - id: what_didnt_work
          description: "Honest limitations, what I would do differently, what I don't know yet"
        - id: bigger_picture
          description: "Multi-level reading: technical micro → application → ideal → philosophical"
        - id: for_non_specialists
          description: "Same project explained for someone who doesn't code"
        - id: stack
          description: "Technologies used — listed, not celebrated"
    projects_v1:
      work:
        - id: sagitterHub
          title: "SagitterHub"
          hook: "Unified enterprise platform built right."
          subtitle: "VisureHub module — the architectural showcase"
          metrics: "TDD >90%, Hexagonal Architecture, DDD, CQRS, Event Sourcing"
          stack: [".NET", "React", "Azure", "Hexagonal Architecture", "DDD", "CQRS", "Event Sourcing", "TDD"]
          primary_for_persona: recruiter

        - id: azure_migration
          title: "Azure Infrastructure Consolidation"
          hook: "Saved €280/month on 46 cloud resources."
          metrics: "€380/month → €100-160/month, 46 resources, Terraform IaC"
          stack: ["Azure", "Terraform", "IaC"]
          primary_for_persona: freelance_client

      personal:
        - id: opengl_renderer
          title: "OpenGL Renderer"
          hook: "Low-level graphics exploration."
          framing: "Active technical exploration — understanding how things really work"

        - id: ios_habit_tracker
          title: "iOS Habit Tracker"
          hook: "First time on iOS — Swift."
          framing: "Problem-driven technology choice, outside main stack"

        - id: unity_soulslike
          title: "Unity Soulslike Game"
          hook: "Exploring a completely different domain."
          framing: "Curiosity beyond the engineering stack"

  - id: contact
    purpose: "Low-friction entry point for both personas"
    emotional_goal: "No hesitation — writing feels like starting a conversation, not signing a contract"
    tone: "Accessible, no implied commitment, open to both employment and freelance"
    headline: "Let's talk"
    subtext: "Whether you're looking for a new team member or want to collaborate on something meaningful — I'm open to conversations."
    form:
      fields:
        - name: name
          type: text
          required: false
        - name: email
          type: email
          required: true
        - name: message
          type: textarea
          required: false
      cta: "Send message"
      success_state: "Message sent. I'll get back to you within a few days."
    shared_artifacts_consumed:
      - tone_of_voice
      - professional_identity

walking_skeleton:
  id: feature_0
  description: "End-to-end validated architecture deployed before any feature work"
  goal: "Prove that code changes reach production via automated deployment"
  deliverables:
    - "Next.js project scaffolded with i18n-ready structure"
    - "Deployed to Vercel free tier"
    - "Custom domain connected (.dev TLD)"
    - "Placeholder page visible at production URL"
    - "Git push triggers automatic deployment"
    - "Contact form wired to external service (Formspree or Resend)"
  stack:
    framework: "Next.js (SSG)"
    styling: "Tailwind CSS"
    hosting: "Vercel (free tier)"
    domain: "christianborrello.dev (or equivalent .dev)"
    contact_form: "Formspree or Resend"
    i18n: "next-intl or next-i18next — structure ready, EN only in v1"
    analytics: "deferred to iteration 2"
  success_criteria: "Production URL accessible with placeholder content, automated deployment confirmed"

future_features:
  - id: analytics_iteration_2
    title: "Privacy-first analytics"
    tool: "Umami (self-hosted)"
    hosting: "Railway or Supabase free tier"
    rationale: "100 unique visits in 4-6 weeks is primary success metric — needs measurement"
    priority: "High for iteration 2"
    blocked_by: "Walking skeleton must be live first"

  - id: persona_ux_v2
    title: "Personalized UX per persona"
    description: |
      At navigation start, ask the visitor:
      'Are you a recruiter or someone interested in collaborating with Christian?'
      Show/hide sections based on the answer.
    rationale: "Reinforces clean content architecture — recruiter sees VisureHub first, freelance client sees Azure migration first"
    risk: "Adds complexity and friction to entry — validate with real traffic before building"
    priority: "v2+ after analytics data confirms persona split"
    note: "Content architecture must support this from day one even if the toggle isn't built yet"

  - id: i18n_italian
    title: "Italian language version"
    description: "Auto-detect browser language, serve Italian version"
    rationale: "Italian market for both recruitment and freelance"
    priority: "v2 after English version validated"
    note: "Strings must be externalized in v1 — no hardcoded text in components"

success_metrics:
  primary:
    - metric: "Unique visits"
      target: 100
      timeframe: "4-6 weeks post-launch"
  secondary:
    - metric: "Source attribution breakdown"
      channels: ["LinkedIn", "GitHub", "direct applications"]
      tool: "UTM parameters"
    - metric: "Inbound contact quality"
      indicator: "Recruiter cites specific content from the site in first message"
  qualitative:
    - "At least one contact that references something specific from the case studies"
