roadmap:
  project_id: experience-timeline
  created_at: '2026-03-03T21:48:28Z'
  total_steps: 8
  phases: 4
phases:
- id: '01'
  name: 'Types, data layer, and i18n messages'
  steps:
  - id: 01-01
    name: 'Experience type definitions'
    criteria:
      - 'TimelineEntryType, TimelinePeriod, TimelineEntry, and ExperienceData types exist and compile'
      - 'Type constrains entry.type to "work" | "education" | "project"'
      - 'period.end accepts string or null'
      - 'Optional fields (highlights, technologies, relatedProjects, projectSlug) are typed per entry type'
    files:
      - src/shared/types/experience.ts
  - id: 01-02
    name: 'Experience YAML loader with validation'
    criteria:
      - 'getExperience(locale) reads content/experience/{locale}.yaml and returns ExperienceData'
      - 'Loader throws descriptive error for missing or invalid required fields at build time'
      - 'Loader follows the same read-parse-validate pattern as content-loader.ts'
      - 'Loader uses js-yaml (existing dependency) for YAML parsing'
    files:
      - src/shared/lib/experience-loader.ts
    dependencies:
      - 01-01
  - id: 01-03
    name: 'YAML placeholder content and i18n message files'
    criteria:
      - 'content/experience/en.yaml contains at least 1 work, 1 education, 1 project entry with all required fields'
      - 'content/experience/it.yaml contains the same entries in Italian'
      - 'messages/en/experience.json contains keys: heading, subtext, type_work, type_education, type_project, present, read_case_study'
      - 'messages/it/experience.json contains the same keys with Italian values'
      - 'Work entry in placeholder YAML includes relatedProjects with at least one slug matching an existing project'
    files:
      - content/experience/en.yaml
      - content/experience/it.yaml
      - messages/en/experience.json
      - messages/it/experience.json
    dependencies:
      - 01-01
- id: '02'
  name: 'Timeline entry component'
  steps:
  - id: 02-01
    name: 'TimelineEntry component with three visual variants'
    criteria:
      - 'Work entry renders: type badge, title, organization, period, description, highlights list, technology tags, nested ProjectCard components for relatedProjects'
      - 'Education entry renders: type badge, title, organization, period, description (no project cards, no tech tags, no case study link)'
      - 'Project entry renders: type badge, title, period, description, technology tags, "Read case study" link to /projects/{projectSlug}'
      - 'Three entry types are visually distinguishable without reading content (different badge color or icon)'
      - 'Semantic HTML: each entry is an <li> with <h3> title; nested project cards in a <ul>'
    files:
      - src/features/experience/timeline-entry.tsx
    dependencies:
      - 01-01
      - 01-03
- id: '03'
  name: 'Timeline section, scroll animation, and homepage integration'
  steps:
  - id: 03-01
    name: 'ExperienceTimeline section with scroll-reveal animation'
    criteria:
      - 'Client component renders <section id="experience"> with <h2> heading from useTranslations("experience")'
      - 'Entries render inside an <ol> in the order received (reverse chronological from YAML)'
      - 'Scroll-reveal: entries start invisible and transition to visible when entering viewport'
      - 'prefers-reduced-motion: all entries immediately visible, no transitions applied'
      - 'Revealed entries stay visible on subsequent scrolls (no re-animation)'
    files:
      - src/features/experience/experience-timeline.tsx
    dependencies:
      - 02-01
  - id: 03-02
    name: 'Homepage integration replacing ProjectGrid'
    criteria:
      - 'page.tsx imports ExperienceTimeline instead of ProjectGrid'
      - 'page.tsx calls getExperience(locale) and passes entries + projectSummaries as props'
      - 'Experience section appears between AboutSection and ContactSection'
      - 'Homepage renders without errors with placeholder YAML data in both locales'
    files:
      - src/app/[locale]/page.tsx
    dependencies:
      - 03-01
      - 01-02
- id: '04'
  name: 'Navigation update and ProjectGrid removal'
  steps:
  - id: 04-01
    name: 'Navigation, hero CTA, and case study back link update'
    criteria:
      - 'NAV_LINKS in navigation.tsx uses key "experience" and href "#experience"'
      - 'Back link on case study pages points to /{locale}/#experience with label from nav.back_to_experience'
      - 'Hero CTA href changes from #projects to #experience'
      - 'common.json (EN): nav.projects renamed to nav.experience, nav.back_to_projects renamed to nav.back_to_experience'
      - 'common.json (IT): same key renames with Italian values "Esperienze" and "Torna alle esperienze"'
    files:
      - src/shared/ui/navigation.tsx
      - src/features/hero/hero-section.tsx
      - src/features/projects/case-study-layout.tsx
      - messages/en/common.json
      - messages/it/common.json
    dependencies:
      - 03-02
  - id: 04-02
    name: 'Remove ProjectGrid after import verification'
    criteria:
      - 'No remaining imports of ProjectGrid exist in the codebase'
      - 'project-grid.tsx is deleted'
      - 'Build succeeds without project-grid.tsx'
    files:
      - src/features/projects/project-grid.tsx
    dependencies:
      - 04-01
implementation_scope:
  source_directories:
  - src/shared/types/
  - src/shared/lib/
  - src/features/experience/
  - src/features/hero/
  - src/features/projects/
  - src/shared/ui/
  - src/app/[locale]/
  - content/experience/
  - messages/en/
  - messages/it/
  test_directories:
  - tests/acceptance/
  excluded_patterns:
  - node_modules/**
  - .next/**
validation:
  status: pending
  reviewer: acceptance-designer
  approved_at: null
