schema_version: "1.0"
project_id: italian-localization
goal: "Add full Italian localization to the portfolio site: Italian UI strings, Italian YAML project content, locale-aware content loader, language switcher, multi-locale SEO (sitemap + metadata)"
validation:
  status: approved
  reviewer: nw-software-crafter-reviewer
deliverables:
  - "docs/design/adrs/adr-007-locale-directories-for-content.md (pre-existing, created during DESIGN wave)"

phases:
  # ============================================================
  # Phase 01 -- Italian UI on Homepage (Milestone 1)
  # Enable /it route with Italian UI strings. Walking skeleton test passes.
  # ============================================================
  - phase_id: "01"
    name: "Italian UI on Homepage"
    description: "Wire the Italian locale end-to-end: config, middleware, message files. After this phase, navigating to /it shows the full homepage with Italian navigation, headings, labels, and footer. Italian message JSON files already exist at messages/it/ (created during DISTILL wave) — this step verifies them and wires the locale config."
    steps:
      - step_id: "01-01"
        description: "Add 'it' to the locales array in i18n config, update the middleware matcher to recognize /it paths, and verify Italian message files are complete. After this step, /it renders the homepage with all Italian UI strings."
        acceptance_criteria:
          - "Navigating to /it returns HTTP 200 (not 404 or redirect)"
          - "Navigation on /it shows 'Progetti', 'Contatti', 'Chi sono'"
          - "Hero section on /it shows 'Vedo architetture dove gli altri vedono task.'"
          - "Footer on /it shows 'Tutti i diritti riservati'"
          - "Contact form on /it shows 'Invia messaggio' as the submit button label"
          - "Projects heading on /it shows 'Progetti'"
          - "Walking skeleton acceptance test passes"
          - "Navigating to /en still shows English UI (no regression)"
        files_to_modify:
          - "src/i18n/config.ts"
          - "middleware.ts"
          - "messages/it/common.json"
          - "messages/it/hero.json"
          - "messages/it/about.json"
          - "messages/it/contact.json"
          - "messages/it/projects.json"
        depends_on: []
        estimated_turns: 15

  # ============================================================
  # Phase 02 -- Italian Content + Content Loader (Milestone 2)
  # Restructure YAML content for locale directories, update loader.
  # ============================================================
  - phase_id: "02"
    name: "Italian Content and Content Loader"
    description: "Migrate YAML project files to locale directories (content/projects/en/ and content/projects/it/) per ADR-007, add locale parameter to content loader, and update all call sites."
    steps:
      - step_id: "02-01"
        description: "Move existing YAML files from content/projects/ to content/projects/en/. Create content/projects/it/ with Italian translations of all 5 project files following the translation rules in component-boundaries.md."
        acceptance_criteria:
          - "5 YAML files exist in content/projects/en/ (moved from content/projects/)"
          - "5 YAML files exist in content/projects/it/ with Italian translations"
          - "Each Italian file has identical slug, type, tags, and stack values as its English counterpart"
          - "Italian files have translated title, subtitle, hook, metrics.label, and all 7 prose sections"
          - "No YAML files remain directly in content/projects/ root"
        files_to_modify:
          - "content/projects/en/sagitterhub.yaml"
          - "content/projects/en/azure-infrastructure.yaml"
          - "content/projects/en/opengl-renderer.yaml"
          - "content/projects/en/ios-habit-tracker.yaml"
          - "content/projects/en/unity-soulslike.yaml"
          - "content/projects/it/sagitterhub.yaml"
          - "content/projects/it/azure-infrastructure.yaml"
          - "content/projects/it/opengl-renderer.yaml"
          - "content/projects/it/ios-habit-tracker.yaml"
          - "content/projects/it/unity-soulslike.yaml"
        depends_on: ["01-01"]
        estimated_turns: 30

      - step_id: "02-02"
        description: "Add locale: Locale parameter to getAllProjects() and getProjectBySlug() in content-loader.ts. Change the read path from content/projects/ to content/projects/${locale}/. The Locale type must come from @/i18n/config."
        acceptance_criteria:
          - "getAllProjects('en') returns the 5 English projects"
          - "getAllProjects('it') returns the 5 Italian projects with Italian titles"
          - "getProjectBySlug('sagitterhub', 'it') returns Italian content"
          - "getProjectBySlug('sagitterhub', 'en') returns English content"
          - "Passing an invalid locale string causes a TypeScript compile error"
        files_to_modify:
          - "src/shared/lib/content-loader.ts"
        depends_on: ["02-01"]
        estimated_turns: 15

      - step_id: "02-03"
        description: "Update all call sites of the content loader to pass locale: ProjectGrid receives locale prop, CaseStudyPage extracts locale from route params, generateStaticParams iterates routing.locales."
        acceptance_criteria:
          - "Navigating to /it/projects/sagitterhub shows Italian case study content"
          - "Navigating to /en/projects/sagitterhub shows English case study content"
          - "All 5 Italian case study pages are accessible at /it/projects/{slug}"
          - "All 5 English case study pages still work at /en/projects/{slug}"
          - "npm run build succeeds without errors"
        files_to_modify:
          - "src/features/projects/project-grid.tsx"
          - "src/app/[locale]/page.tsx"
          - "src/app/[locale]/projects/[slug]/page.tsx"
        depends_on: ["02-02"]
        estimated_turns: 20

  # ============================================================
  # Phase 03 -- Language Switcher + SEO Metadata (Milestone 2 continued)
  # User-facing locale toggle and multi-locale SEO metadata.
  # ============================================================
  - phase_id: "03"
    name: "Language Switcher and SEO Metadata"
    description: "Create the LanguageSwitcher component, integrate into navigation, and update metadata helpers with locale-aware canonical URLs and hreflang alternates."
    steps:
      - step_id: "03-01"
        description: "Create LanguageSwitcher client component using next-intl's useLocale() and usePathname(). Renders a link showing the OTHER locale (EN when on /it, IT when on /en). Integrate into Navigation component for both desktop and mobile layouts."
        acceptance_criteria:
          - "On /it page, a switcher element displays 'EN' and links to the /en equivalent"
          - "On /en page, a switcher element displays 'IT' and links to the /it equivalent"
          - "Clicking switcher on /en/projects/sagitterhub navigates to /it/projects/sagitterhub"
          - "Switcher is visible in both desktop and mobile navigation"
        files_to_modify:
          - "src/shared/ui/language-switcher.tsx"
          - "src/shared/ui/navigation.tsx"
        depends_on: ["02-03"]
        estimated_turns: 25

      - step_id: "03-02"
        description: "Update metadata helpers to accept locale parameter. buildHomeMetadata and buildCaseStudyMetadata generate locale-aware canonical URLs and hreflang alternates for all configured locales."
        acceptance_criteria:
          - "HTML <link rel='canonical'> on /it homepage contains /it/ in the URL"
          - "HTML <link rel='canonical'> on /en/projects/sagitterhub contains /en/projects/sagitterhub"
          - "Both home and case study pages include alternates.languages entries for en and it"
          - "npm run build succeeds"
        files_to_modify:
          - "src/shared/lib/metadata.ts"
          - "src/app/[locale]/page.tsx"
          - "src/app/[locale]/projects/[slug]/page.tsx"
        depends_on: ["02-03"]
        estimated_turns: 20

  # ============================================================
  # Phase 04 -- Infrastructure Validation (Milestone 3)
  # Sitemap, static generation, and build-time content validation.
  # ============================================================
  - phase_id: "04"
    name: "Infrastructure and Build Validation"
    description: "Ensure sitemap covers both locales, static build generates all locale pages, and build pipeline validates content completeness."
    steps:
      - step_id: "04-01"
        description: "Update sitemap.ts to generate URLs for all locales with hreflang alternates. Verify build generates static HTML for both locales."
        acceptance_criteria:
          - "Generated sitemap.xml contains URLs for both /en/ and /it/ paths"
          - "Each sitemap entry includes alternate language links for en and it"
          - "npm run build generates static HTML for /it and /en homepage"
          - "npm run build generates static HTML for all 10 case study pages (5 per locale)"
        files_to_modify:
          - "src/app/sitemap.ts"
        depends_on: ["02-03"]
        estimated_turns: 15
