schema_version: "1.0"
project_id: portfolio-cv-site
goal: "Build and deploy Christian Borrello's portfolio/CV site as a Next.js SSG application on Vercel"
validation:
  status: pending
  reviewer: null

phases:
  # ============================================================
  # Phase 01 -- Walking Skeleton (Feature 0)
  # Minimum deployable site: scaffold, i18n, placeholder, form, CI
  # ============================================================
  - phase_id: "01"
    name: "Walking Skeleton"
    description: "Deploy a minimal Next.js site to Vercel with i18n structure and Formspree form wired end-to-end. After this, every feature starts from a working, deployed foundation."
    steps:
      - step_id: "01-01"
        description: "Scaffold Next.js project with TypeScript, Tailwind CSS v4, ESLint, and App Router using create-next-app. Clean boilerplate from page.tsx and globals.css."
        acceptance_criteria:
          - "Running 'npm run dev' starts the dev server without errors"
          - "Running 'npm run build' produces a successful build"
          - "TypeScript strict mode is enabled in tsconfig.json"
          - "Tailwind CSS directives are present in globals.css"
        files_to_modify:
          - "package.json"
          - "tsconfig.json"
          - "next.config.ts"
          - "tailwind.config.ts"
          - "src/app/layout.tsx"
          - "src/app/page.tsx"
          - "src/app/globals.css"
          - ".gitignore"
        depends_on: []
        estimated_turns: 20

      - step_id: "01-02"
        description: "Install runtime deps (next-intl, gray-matter, js-yaml) and dev dep (@types/js-yaml). Create feature and shared directory structure under src/."
        acceptance_criteria:
          - "Dependencies are listed in package.json and lockfile is updated"
          - "Directories exist: src/features/{hero,about,projects,contact}, src/shared/{ui,types,lib}, src/i18n, content/projects, messages/en"
        files_to_modify:
          - "package.json"
          - "package-lock.json"
        depends_on:
          - "01-01"
        estimated_turns: 20

      - step_id: "01-03"
        description: "Configure next-intl with App Router: i18n config, request handler, locale routing middleware, locale layout with NextIntlClientProvider, and initial locale JSON files."
        acceptance_criteria:
          - "Navigating to /en loads the page with translated content"
          - "Navigating to / redirects to /en"
          - "All visible text on the placeholder page comes from locale JSON files"
          - "No user-facing string is hardcoded in any tsx file"
        files_to_modify:
          - "src/i18n/config.ts"
          - "src/i18n/request.ts"
          - "src/i18n/navigation.ts"
          - "src/app/[locale]/layout.tsx"
          - "src/app/[locale]/page.tsx"
          - "next.config.ts"
          - "messages/en/common.json"
          - "messages/en/hero.json"
          - "messages/en/contact.json"
        depends_on:
          - "01-02"
        estimated_turns: 30

      - step_id: "01-04"
        description: "Create placeholder home page with hero heading, positioning statement, and a minimal contact form section. All text via i18n keys."
        acceptance_criteria:
          - "Page displays Christian's name and a positioning statement"
          - "A contact form section is visible with email field and submit button"
          - "All displayed text originates from messages/en/ locale files"
        files_to_modify:
          - "src/app/[locale]/page.tsx"
          - "src/features/hero/hero-section.tsx"
          - "src/features/contact/contact-section.tsx"
          - "src/features/contact/contact-form.tsx"
          - "messages/en/hero.json"
          - "messages/en/contact.json"
        depends_on:
          - "01-03"
        estimated_turns: 25

      - step_id: "01-05"
        description: "Wire contact form to Formspree: environment variable for form ID, client-side fetch POST, email validation, success/error state display, field preservation on error."
        acceptance_criteria:
          - "Submitting with a valid email shows the success message"
          - "Submitting without an email shows an inline error on the email field"
          - "After a validation error, previously entered text in other fields is preserved"
          - "The form POSTs to Formspree and the submission appears in Formspree dashboard"
        files_to_modify:
          - ".env.local"
          - ".env.example"
          - "src/features/contact/contact-form.tsx"
          - "src/shared/types/contact.ts"
        depends_on:
          - "01-04"
        estimated_turns: 25

      - step_id: "01-06"
        description: "Create GitHub Actions CI workflow with lint, typecheck, and build steps. Add npm scripts for typecheck and ci. Configure branch protection."
        acceptance_criteria:
          - "Pushing to a PR branch triggers the CI workflow"
          - "CI runs lint, typecheck, and build in sequence"
          - "A failing lint or typecheck blocks the PR from merging"
          - "Running 'npm run ci' locally executes the same checks"
        files_to_modify:
          - ".github/workflows/ci.yml"
          - "package.json"
        depends_on:
          - "01-05"
        estimated_turns: 20

  # ============================================================
  # Phase 02 -- Hero Section (US-01)
  # Identity statement, tagline, CTAs
  # ============================================================
  - phase_id: "02"
    name: "Hero Section"
    description: "Communicate Christian's professional identity in 30 seconds with an authentic identity statement, systemic differentiator, and clear CTAs."
    steps:
      - step_id: "02-01"
        description: "Build hero component with primary identity statement, supporting line, name, role, tagline, and two CTAs (View my work, Get in touch) all sourced from i18n keys."
        acceptance_criteria:
          - "Hero displays a primary statement that avoids generic terms like 'passionate' or 'results-driven'"
          - "A supporting line names the systemic differentiator"
          - "Two CTA buttons are visible: one scrolls to projects, one scrolls to contact"
          - "No technology list appears in the hero section"
          - "All text comes from messages/en/hero.json"
        files_to_modify:
          - "src/features/hero/hero-section.tsx"
          - "messages/en/hero.json"
        depends_on:
          - "01-06"
        estimated_turns: 25

      - step_id: "02-02"
        description: "Style hero section with Tailwind: responsive layout, modern and sober visual treatment, proper heading hierarchy, accessible contrast."
        acceptance_criteria:
          - "Hero section is visually distinct and fills the viewport on desktop"
          - "Layout adapts gracefully on mobile viewports"
          - "Text contrast meets WCAG AA ratio (4.5:1 minimum)"
          - "Heading hierarchy starts with h1 for the primary statement"
        files_to_modify:
          - "src/features/hero/hero-section.tsx"
          - "src/app/globals.css"
        depends_on:
          - "02-01"
        estimated_turns: 25

  # ============================================================
  # Phase 03 -- About Section (US-02)
  # Values, ADHD framing, philosophy, what seeking
  # ============================================================
  - phase_id: "03"
    name: "About Section"
    description: "Present Christian's human and professional identity: systems thinking, ADHD framing, philosophy, values, and what he looks for in a team."
    steps:
      - step_id: "03-01"
        description: "Build about component structure with subsections: identity, ADHD framing, technology philosophy, philosophical layer, values, and what-I-look-for. All text from about.json."
        acceptance_criteria:
          - "ADHD is described as a functional pattern (curiosity, hyperfocus, systems vision), not a limitation"
          - "Technology philosophy statement is present and matches the discovery phrase"
          - "Non-negotiable values are stated: honesty, simplicity, humanity, mutual respect"
          - "The section states what Christian looks for: remote-first, ownership, non-negotiable quality"
          - "No skills list or certifications appear in the section"
        files_to_modify:
          - "src/features/about/about-section.tsx"
          - "messages/en/about.json"
        depends_on:
          - "02-02"
        estimated_turns: 25

      - step_id: "03-02"
        description: "Style about section with Tailwind: readable typography, visual hierarchy for subsections, responsive layout, accessible contrast."
        acceptance_criteria:
          - "Section is readable in approximately 90 seconds (250-350 words)"
          - "Visual hierarchy distinguishes the subsections without separate page breaks"
          - "Layout is comfortable to read on both desktop and mobile"
        files_to_modify:
          - "src/features/about/about-section.tsx"
        depends_on:
          - "03-01"
        estimated_turns: 20

  # ============================================================
  # Phase 04 -- Contact Section Enhancement (US-04)
  # Styling and states refinement
  # ============================================================
  - phase_id: "04"
    name: "Contact Section Enhancement"
    description: "Polish the contact form with conversational tone, refined styling, and clear success/error states."
    steps:
      - step_id: "04-01"
        description: "Enhance contact section: conversational headline ('Let''s talk'), subtext welcoming both recruiters and collaborators, polished success animation, clear error styling, form labels with proper accessibility."
        acceptance_criteria:
          - "Headline is conversational, not transactional"
          - "Subtext explicitly mentions openness to both employment and freelance collaboration"
          - "Success state displays: 'Message sent. I''ll get back to you within a few days.'"
          - "Error state highlights the email field with a plain-language message"
          - "All form inputs have associated labels"
          - "No CAPTCHA is present"
        files_to_modify:
          - "src/features/contact/contact-section.tsx"
          - "src/features/contact/contact-form.tsx"
          - "messages/en/contact.json"
        depends_on:
          - "03-02"
        estimated_turns: 25

  # ============================================================
  # Phase 05 -- Projects Section (US-03)
  # Content loader, card grid, case study template, sample data
  # ============================================================
  - phase_id: "05"
    name: "Projects Section"
    description: "Build the projects grid with YAML-driven content, project cards with hooks, and the 8-section case study page template."
    steps:
      - step_id: "05-01"
        description: "Build content loader: read YAML project files from content/projects/ at build time, parse with gray-matter and js-yaml, return typed ProjectCaseStudy and ProjectSummary data."
        acceptance_criteria:
          - "A YAML file in content/projects/ is parsed into a typed ProjectCaseStudy object at build time"
          - "All projects are returned sorted: work projects first, then personal"
          - "A missing or malformed YAML file produces a clear build-time error"
          - "Summary data can be derived from full case study data"
        files_to_modify:
          - "src/shared/lib/content-loader.ts"
          - "src/shared/types/project.ts"
        depends_on:
          - "04-01"
        estimated_turns: 25

      - step_id: "05-02"
        description: "Build project card grid: responsive grid of project cards, each showing title, hook, type badge, tags, and a CTA linking to the case study page."
        acceptance_criteria:
          - "Five project cards are displayed in a responsive grid"
          - "Each card shows a concrete hook (metric or curiosity framing), not just a technology list"
          - "Work project cards highlight measurable outcomes (TDD >90%, EUR 280/month saved)"
          - "Personal project cards use active exploration language, no apologetic terms"
          - "Each card has a 'Read case study' link pointing to /en/projects/[slug]"
        files_to_modify:
          - "src/features/projects/project-card.tsx"
          - "src/features/projects/project-grid.tsx"
          - "src/app/[locale]/page.tsx"
          - "messages/en/projects.json"
        depends_on:
          - "05-01"
        estimated_turns: 30

      - step_id: "05-03"
        description: "Build case study page template: dynamic route [slug], 8-section layout (problem, what I saw, decisions, beyond assignment, what didn't work, bigger picture, for non-specialists, stack), anchor navigation."
        acceptance_criteria:
          - "Navigating to /en/projects/sagitterhub renders the full case study"
          - "All 8 sections are rendered with headings matching the section labels from projects.json"
          - "Stack is displayed as a tag list appendix, not as the primary content"
          - "A 'Back to projects' link returns to the home page projects section"
          - "Case study page has unique meta title and description"
        files_to_modify:
          - "src/app/[locale]/projects/[slug]/page.tsx"
          - "src/features/projects/case-study-layout.tsx"
          - "messages/en/projects.json"
          - "src/shared/lib/metadata.ts"
        depends_on:
          - "05-02"
        estimated_turns: 30

      - step_id: "05-04"
        description: "Create sample project YAML files with placeholder content for all 5 projects (SagitterHub, Azure Infrastructure, OpenGL Renderer, iOS Habit Tracker, Unity Soulslike)."
        acceptance_criteria:
          - "Five YAML files exist in content/projects/ with correct slugs"
          - "Each YAML file conforms to the ProjectCaseStudy schema (all required fields present)"
          - "Work projects (sagitterhub, azure-infrastructure) have all 8 sections populated with placeholder text"
          - "The site builds successfully with all 5 project files"
        files_to_modify:
          - "content/projects/sagitterhub.yaml"
          - "content/projects/azure-infrastructure.yaml"
          - "content/projects/opengl-renderer.yaml"
          - "content/projects/ios-habit-tracker.yaml"
          - "content/projects/unity-soulslike.yaml"
        depends_on:
          - "05-03"
        estimated_turns: 25

  # ============================================================
  # Phase 06 -- Infrastructure & Polish
  # SEO, navigation, acceptance tests
  # ============================================================
  - phase_id: "06"
    name: "Infrastructure and Polish"
    description: "Add SEO metadata, site navigation, responsive polish, and Playwright acceptance test infrastructure."
    steps:
      - step_id: "06-01"
        description: "Add SEO: generateMetadata for home and case study pages, Open Graph tags for LinkedIn sharing, default OG image, sitemap.ts for automatic sitemap generation."
        acceptance_criteria:
          - "Home page has meta title 'Christian Borrello -- Software Engineer' and a description"
          - "Each case study page has a unique meta title and description derived from project data"
          - "Open Graph tags (og:title, og:description, og:image, og:url) are present on all pages"
          - "Sitemap is accessible at /sitemap.xml and lists all pages"
        files_to_modify:
          - "src/app/[locale]/layout.tsx"
          - "src/app/[locale]/page.tsx"
          - "src/app/[locale]/projects/[slug]/page.tsx"
          - "src/shared/lib/metadata.ts"
          - "src/app/sitemap.ts"
          - "public/og-image.png"
        depends_on:
          - "05-04"
        estimated_turns: 25

      - step_id: "06-02"
        description: "Add navigation: sticky top nav with section anchor links (About, Projects, Contact), smooth scroll behavior, responsive mobile nav, footer with copyright and social links."
        acceptance_criteria:
          - "Clicking a nav link scrolls smoothly to the corresponding section"
          - "Nav is visible and functional on both desktop and mobile viewports"
          - "On case study pages, nav includes a 'Back to projects' link"
          - "Footer displays copyright and a 'built with' attribution"
          - "Heading hierarchy across all sections is semantically correct (h1 then h2 then h3)"
        files_to_modify:
          - "src/app/[locale]/layout.tsx"
          - "src/shared/ui/navigation.tsx"
          - "src/shared/ui/footer.tsx"
          - "messages/en/common.json"
        depends_on:
          - "06-01"
        estimated_turns: 30

      - step_id: "06-03"
        description: "Set up Playwright for acceptance testing: install, configure, create test helpers, implement walking skeleton scenarios (site reachable, form submission, i18n verification)."
        acceptance_criteria:
          - "Running 'npx playwright test' executes the walking skeleton test suite"
          - "Test verifies the site loads with HTTP 200"
          - "Test verifies the contact form shows success state after valid submission"
          - "Test verifies no hardcoded user-facing text exists outside locale files"
        files_to_modify:
          - "package.json"
          - "playwright.config.ts"
          - "tests/acceptance/steps/walking-skeleton.steps.ts"
        depends_on:
          - "06-02"
        estimated_turns: 30
